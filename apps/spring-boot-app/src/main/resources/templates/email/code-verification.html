<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Doğrulama Kodu</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 20px auto; background: #ffffff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .header { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #eeeeee; }
        .content { padding: 20px 0; text-align: center; }
        .code-box { background-color: #f8f9fa; border: 1px solid #dee2e6; padding: 15px; font-size: 24px; font-weight: bold; letter-spacing: 5px; color: #333; display: inline-block; margin: 20px 0; border-radius: 5px; }
        .footer { text-align: center; font-size: 12px; color: #888888; margin-top: 20px; border-top: 1px solid #eeeeee; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Randevu App</h2>
        </div>
        <div class="content">
            <h3>Doğrulama Kodunuz</h3>
            <p>Merhaba,</p>
            <p>İşleminize devam etmek için aşağıdaki doğrulama kodunu kullanın. Bu kod 15 dakika süreyle geçerlidir.</p>

            <!-- Code değişkeni CodeVerificationStrategy'den geliyor -->
            <div class="code-box" th:text="${code}">123456</div>

            <p>Bu kodu kimseyle paylaşmayınız.</p>
        </div>
        <div class="footer">
            <p>Bu e-postayı siz talep etmediyseniz, lütfen dikkate almayınız.</p>
        </div>
    </div>
</body>
</html>
