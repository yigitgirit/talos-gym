# ===================================================================
# TALOS GYM - SPRING BOOT APPLICATION CONFIGURATION
# ===================================================================
# This is the base configuration file. Properties defined here apply to all environments
# unless overridden by a profile-specific file (e.g., application-dev.properties).

# ===================================================================
# 1. CORE APPLICATION
# ===================================================================
spring.application.name=talos-gym
# Server port. Can be overridden via PORT environment variable (useful for cloud deployments).
server.port=${BACKEND_PORT:8080}
application.base-url=${BACKEND_URL:http://localhost:8080}
application.frontend-url=${FRONTEND_URL:http://localhost:3000}
spring.output.ansi.enabled=always
# Active Spring Profile (e.g., dev, prod). Defaults to dev.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ===================================================================
# 2. LOGGING
# ===================================================================
# Global root log level (INFO, WARN, ERROR, DEBUG, TRACE)
logging.level.root=INFO
# Custom log level for our application package. Injectable via APP_LOG_LEVEL.
logging.level.com.talosgym.talos_gym=${APP_LOG_LEVEL:INFO}
# Colorful and readable console output format.
logging.pattern.console=%clr(%d{HH:mm:ss}){faint} %clr(%-5level) %clr([%thread]){magenta} %clr(%logger{40}){cyan} %clr(-){faint} %msg%n

# ===================================================================
# 3. DATABASE & JPA (Hibernate)
# ===================================================================
# PostgreSQL Connection Settings. These values are injected from environment variables.
# For local IDE development, set these in your Run Configuration.
# For Docker, they are passed from the .env file via docker-compose.yaml.
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Specify the database driver to help Hibernate figure out the dialect.
spring.datasource.driver-class-name=org.postgresql.Driver
# Provide the explicit dialect.
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Hibernate DDL Auto. Set to 'none' globally to prevent accidental schema changes. Managed in profiles.
spring.jpa.hibernate.ddl-auto=none
# Disable Spring Boot's built-in SQL initialization. We use custom SQL scripts via Docker init.
spring.sql.init.mode=never
# Disable Open Session In View to avoid unexpected database queries during JSON serialization.
spring.jpa.open-in-view=false
# Batch fetching to optimize queries and avoid N+1 problems.
spring.jpa.properties.hibernate.default_batch_fetch_size=100
# Force UTC timezone for database storage.
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# 4. JSON SERIALIZATION (Jackson)
# ===================================================================
# Force Jackson to serialize/deserialize dates in UTC.
spring.jackson.time-zone=UTC

# ===================================================================
# 5. SECURITY & JWT
# ===================================================================
# Secret key for JWT signing. Must be a long, unpredictable string.
application.security.secret-key=${JWT_SECRET_KEY}
application.security.issuer=talos-gym
# JWT Access Token lifespan (in milliseconds) - Default: 15 minutes (900000ms)
application.security.access-token.expiration=900000
# JWT Refresh Token lifespan (in milliseconds) - Default: 30 days (2592000000ms)
application.security.refresh-token.expiration=2592000000
# Cron job schedule to purge expired refresh tokens from the DB. (Runs daily at 3:00 AM)
application.security.refresh-token.cleanup-cron=0 0 3 * * *
application.security.phone-verification-validity-days=365
application.security.email-verification-validity-days=180

# ===================================================================
# 6. MAIL CONFIGURATION (SMTP)
# ===================================================================
# Default settings for Gmail SMTP.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===================================================================
# 7. SMS CONFIGURATION (MACRODROID)
# ===================================================================
application.sms.provider=macrodroid
macrodroid.webhook.url=${MACRODROID_WEBHOOK_URL}
macrodroid.webhook.secret=${MACRODROID_WEBHOOK_SECRET}

# ===================================================================
# 8. ACTUATOR (Monitoring)
# ===================================================================
# Expose /actuator/health for load balancers and Docker healthchecks.
management.endpoints.web.exposure.include=health
# Prevent healthcheck from failing if SMTP server is temporarily unreachable.
management.health.mail.enabled=false

# Verification Settings
application.verification.token-validity-minutes=15
application.verification.max-attempts=3
application.verification.code-length=6
application.verification.password-reset-token-validity-minutes=15

# Auth Password Settings
application.auth.password.otp-validity-minutes=1
application.auth.password.reset-token-validity-minutes=1
application.auth.password.max-attempts=3
application.auth.password.code-length=6

# Pending User Cache Settings
application.auth.pending-user.ttl-minutes=15

# Redis
spring.data.redis.url=${SPRING_DATA_REDIS_URL}

# Spam Protection
application.verification.spam.max-requests-per-hour=5
application.verification.spam.block-duration-minutes=30

# TEMPORARY!!!!!!
locationiq.api.key=${LOCATIONIQ_API_KEY}