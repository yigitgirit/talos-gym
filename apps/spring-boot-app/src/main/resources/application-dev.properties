# ===================================================================
# DEVELOPMENT PROFILE OVERRIDES
# ===================================================================
# These properties are active when the 'dev' profile is enabled.

# ===================================================================
# 1. DATABASE & JPA (Hibernate)
# ===================================================================
# Hibernate DDL Auto Strategy for 'dev' profile.
# validate: Checks if the database schema matches the JPA entities. Fails on mismatch.
# update: Attempts to update the schema to match the entities. Risky, can lead to data loss.
# create-drop: Creates the schema on startup and drops it on shutdown. Useful for tests.
# create: Creates the schema on startup, but doesn't drop it.
spring.jpa.hibernate.ddl-auto=update

# Show formatted SQL in the logs for easier debugging.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Log detailed Hibernate statistics (e.g., query execution times, cache hits).
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
# Uncomment to see the actual values bound to prepared statements in logs.
# logging.level.org.hibernate.orm.jdbc.bind=TRACE

# ===================================================================
# 2. CORS
# ===================================================================
# Allow requests from the local Next.js development server.
# Can be overridden by setting the FRONTEND_URL environment variable.
application.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# ===================================================================
# 3. DEVELOPER TOOLS (Spring Boot DevTools)
# ===================================================================
# Enable LiveReload for automatic browser refresh when files change.
spring.devtools.livereload.enabled=true
# How often DevTools should check for file changes to trigger a restart.
spring.devtools.restart.poll-interval=1s

# ===================================================================
# 4. SMS PROVIDER
# ===================================================================
# Use mock SMS sender in development to avoid sending real messages
application.sms.provider=mock
