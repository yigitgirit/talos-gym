# ===================================================================
# PRODUCTION PROFILE OVERRIDES
# ===================================================================
# These properties are active when the 'prod' profile is enabled.

# ===================================================================
# 1. DATABASE & JPA (Hibernate)
# ===================================================================
# Hibernate DDL Auto Strategy for 'prod' profile.
# MUST ALWAYS BE 'none' or 'validate' in production to prevent data loss.
# 'validate' is highly recommended as it acts as a safety check against schema drift.
spring.jpa.hibernate.ddl-auto=validate

# Disable SQL formatting and statistics in production for optimal performance.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.generate_statistics=false

# ===================================================================
# 2. LOGGING
# ===================================================================
# Set root log level to WARN to reduce unnecessary noise in production logs.
logging.level.root=WARN
# Set our application package log level to WARN by default. Can be overridden via APP_LOG_LEVEL.
logging.level.com.talosgym.talos_gym=${APP_LOG_LEVEL:WARN}

# ===================================================================
# 3. CORS
# ===================================================================
# Only allow requests from the exact production frontend URL.
# This variable MUST be provided in the production environment (e.g., via Docker Compose).
application.cors.allowed-origins=${FRONTEND_URL}
