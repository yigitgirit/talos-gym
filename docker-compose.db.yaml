services:
  database:
    image: postgres:17-alpine
    container_name: talosgym-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    networks:
      - backend-network
    volumes:
        - postgres_data:/var/lib/postgresql/data
        - ./database/schema:/docker-entrypoint-initdb.d
    ports:
        - "${DATABASE_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: talosgym-redis
    ports:
      - "6379:6379"
    networks:
      - backend-network
    healthcheck:
     test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
     interval: 10s
     timeout: 5s
     retries: 5

volumes:
  postgres_data:

networks:
  backend-network:
    name: talosgym-network
